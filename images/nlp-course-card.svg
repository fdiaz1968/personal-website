<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#004b85"/>
      <stop offset="100%" stop-color="#0a2540"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- sentence breaking into word tokens -->
  <g font-family="Roboto, Arial, sans-serif" font-size="30" fill="#ffffff" text-anchor="middle">
    <text x="600" y="230">"El modelo procesa texto"</text>
  </g>
  <g stroke="#f7ae00" stroke-width="2" stroke-dasharray="6 6">
    <line x1="600" y1="250" x2="330" y2="330"/>
    <line x1="600" y1="250" x2="470" y2="330"/>
    <line x1="600" y1="250" x2="620" y2="330"/>
    <line x1="600" y1="250" x2="780" y2="330"/>
    <line x1="600" y1="250" x2="900" y2="330"/>
  </g>
  <g font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="700" fill="#004b85">
    <rect x="280" y="335" width="100" height="46" rx="10" fill="#ffffff"/>
    <text x="330" y="365" text-anchor="middle">El</text>
    <rect x="405" y="335" width="140" height="46" rx="10" fill="#ffffff"/>
    <text x="475" y="365" text-anchor="middle">modelo</text>
    <rect x="565" y="335" width="130" height="46" rx="10" fill="#ffffff"/>
    <text x="630" y="365" text-anchor="middle">procesa</text>
    <rect x="715" y="335" width="110" height="46" rx="10" fill="#ffffff"/>
    <text x="770" y="365" text-anchor="middle">texto</text>
    <rect x="845" y="335" width="90" height="46" rx="10" fill="#ffffff"/>
    <text x="890" y="365" text-anchor="middle">.</text>
  </g>
</svg>
